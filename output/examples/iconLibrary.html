<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AO Design System — Strata Icon Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://assets.ao.com/design-system/assets/icons/latest/strata-icons.css">
  <style>
    :root {
      --gray-10: #f8f9fa; --gray-20: #f0f2f2; --gray-30: #e2e7e8;
      --gray-40: #d6dddf; --gray-50: #c1c7c9; --gray-60: #abb1b4;
      --gray-70: #727677; --gray-80: #595d5e; --gray-90: #3f4344; --gray-100: #212121;
      --brand-primary-base: #12c35a; --brand-primary-light: #befcc8;
      --type-primary: #011f44; --type-secondary: #212121; --type-tertiary: #595d5e;
      --action-primary-base: #00893e;
      --action-secondary-base: #0564c2; --action-secondary-hover: #00318f;
      --radius-sm: 8px; --radius-md: 16px;
      --shadow: 0 1px 3px rgba(1,22,48,0.08), 0 1px 2px rgba(1,22,48,0.05);
    }

    @font-face {
      font-family: 'SmileyFace';
      font-weight: 700;
      font-display: swap;
      src: url('https://media.ao.com/fonts/smiley-face/SmileyFace-Bold.woff2') format('woff2'),
           url('https://media.ao.com/fonts/smiley-face/SmileyFace-Bold.woff') format('woff');
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; padding: 2rem;
      font-family: 'Inter', sans-serif; font-size: 1rem;
      color: var(--type-primary); background: var(--gray-10);
      line-height: 1.5;
    }

    .page-header {
      max-width: 1200px; margin: 0 auto 2rem;
      padding-bottom: 1.5rem; border-bottom: 1px solid var(--gray-30);
    }
    .page-header h1 {
      font-family: 'SmileyFace', Georgia, serif; font-weight: 700;
      font-size: 2rem; margin: 0 0 0.5rem; color: var(--type-primary);
    }
    .page-header p { margin: 0; color: var(--type-tertiary); font-size: 0.875rem; }

    .search-wrap {
      max-width: 1200px; margin: 0 auto 2rem;
    }
    .search-input {
      width: 100%; max-width: 400px; padding: 0.625rem 1rem;
      border: 1px solid var(--gray-50); border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif; font-size: 0.875rem;
      color: var(--type-secondary); outline: none;
      transition: border-color 150ms, box-shadow 150ms;
    }
    .search-input:focus {
      border-color: var(--action-secondary-base);
      box-shadow: 0 0 0 3px rgba(5,100,194,0.15);
    }
    .search-input::placeholder { color: var(--gray-60); }

    .size-demo {
      max-width: 1200px; margin: 0 auto 2.5rem;
      padding: 1.5rem; background: #fff; border: 1px solid var(--gray-40);
      border-radius: var(--radius-md);
    }
    .size-demo h2 {
      font-family: 'SmileyFace', Georgia, serif; font-weight: 700;
      font-size: 1.25rem; margin: 0 0 1rem;
    }
    .size-row {
      display: flex; align-items: center; gap: 2rem; flex-wrap: wrap;
    }
    .size-item {
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    }
    .size-item .ico { color: var(--type-primary); }
    .size-item span { font-size: 0.75rem; color: var(--type-tertiary); }

    .section {
      max-width: 1200px; margin: 0 auto 2.5rem;
    }
    .section h2 {
      font-family: 'SmileyFace', Georgia, serif; font-weight: 700;
      font-size: 1.25rem; margin: 0 0 1rem; color: var(--type-primary);
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1px; background: var(--gray-30);
      border: 1px solid var(--gray-30); border-radius: var(--radius-md);
      overflow: hidden;
    }
    .icon-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.5rem; padding: 1.25rem 0.5rem; background: #fff;
      text-align: center; cursor: pointer;
      transition: background 150ms;
    }
    .icon-card:hover { background: var(--gray-10); }
    .icon-card .ico { font-size: 1.5rem; color: var(--type-primary); }
    .icon-card .icon-name {
      font-size: 0.6875rem; color: var(--type-tertiary);
      word-break: break-all; line-height: 1.3;
    }
    .icon-card.is-hidden { display: none; }

    .count { font-size: 0.8125rem; color: var(--type-tertiary); margin-bottom: 1rem; }

    @media (prefers-reduced-motion: no-preference) {
      .icon-card { transition: background 150ms ease-out, transform 150ms ease-out; }
      .icon-card:hover { transform: translateY(-2px); }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Strata Icon Library</h1>
    <p>All icons from the AO Strata icon font. Click any icon to copy its class name.</p>
  </div>

  <div class="search-wrap">
    <input type="search" class="search-input" id="iconSearch" placeholder="Filter icons… e.g. basket, chevron, delivery">
  </div>

  <div class="size-demo">
    <h2>Size scale</h2>
    <div class="size-row">
      <div class="size-item"><i class="ico ico-basket ico-xs"></i><span>ico-xs</span></div>
      <div class="size-item"><i class="ico ico-basket ico-sm"></i><span>ico-sm</span></div>
      <div class="size-item"><i class="ico ico-basket"></i><span>default</span></div>
      <div class="size-item"><i class="ico ico-basket ico-lg"></i><span>ico-lg</span></div>
      <div class="size-item"><i class="ico ico-basket ico-xl"></i><span>ico-xl</span></div>
      <div class="size-item"><i class="ico ico-basket ico-2x"></i><span>ico-2x</span></div>
      <div class="size-item"><i class="ico ico-basket ico-3x"></i><span>ico-3x</span></div>
      <div class="size-item"><i class="ico ico-basket ico-4x"></i><span>ico-4x</span></div>
      <div class="size-item"><i class="ico ico-basket ico-5x"></i><span>ico-5x</span></div>
    </div>
  </div>

  <div class="section">

    const grid = document.getElementById('iconGrid');
    const countEl = document.getElementById('iconCount');
    const searchInput = document.getElementById('iconSearch');

    // Render all icons
    icons.forEach(name => {
      const card = document.createElement('div');
      card.className = 'icon-card';
      card.dataset.name = name;
      card.innerHTML = `<i class="ico ico-${name}"></i><span class="icon-name">ico-${name}</span>`;
      card.title = `Click to copy: ico ico-${name}`;
      card.addEventListener('click', () => {
        navigator.clipboard.writeText(`ico ico-${name}`);
        card.querySelector('.icon-name').textContent = 'Copied!';
        setTimeout(() => {
          card.querySelector('.icon-name').textContent = `ico-${name}`;
        }, 1200);
      });
      grid.appendChild(card);
    });

    countEl.textContent = `${icons.length} icons`;

    // Search/filter
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase().trim();
      let visible = 0;
      document.querySelectorAll('.icon-card').forEach(card => {
        const match = card.dataset.name.includes(query);
        card.classList.toggle('is-hidden', !match);
        if (match) visible++;
      });
      countEl.textContent = query ? `${visible} of ${icons.length} icons` : `${icons.length} icons`;
    });
